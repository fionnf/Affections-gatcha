    align-items: center;
    cursor: pointer;
    color: var(--ag-text);
    font-weight: 700;
  }

  .ag-rules p {
    margin: 0 0 10px;
  }

  .ag-rules ul {
    margin: 0;
    padding-left: 18px;
    columns: 2;
  }

  .ag-rules li {
    break-inside: avoid;
    margin-bottom: 4px;
  }

  .ag-widget[data-tone="quiet"] .ag-badge {
    color: var(--ag-muted);
  }

  .ag-widget[data-tone="quest"] .ag-badge {
    color: var(--ag-blue);
  }

  .ag-widget[data-tone="warm"] .ag-badge {
    color: var(--ag-gold);
  }

  .ag-widget[data-tone="cursed"] .ag-badge {
    color: var(--ag-primary-dark);
    background: rgba(167, 61, 83, 0.12);
  }

  .ag-widget[data-tone="rare"] .ag-badge,
  .ag-widget[data-tone="photo"] .ag-badge {
    color: var(--ag-green);
  }

  .ag-widget[data-tone="jackpot"] .ag-badge {
    color: var(--ag-gold);
    background: rgba(185, 120, 46, 0.16);
  }

  @keyframes ag-shake {
    0%,
    100% {
      transform: rotate(0deg) translateY(0);
    }
    18% {
      transform: rotate(-8deg) translateY(-6px);
    }
    38% {
      transform: rotate(9deg) translateY(3px);
    }
    58% {
      transform: rotate(-5deg) translateY(-2px);
    }
    78% {
      transform: rotate(4deg) translateY(1px);
    }
  }

  @keyframes ag-enter {
    from {
      opacity: 0;
      transform: scale(0.98);
    }
    to {
      opacity: 1;
      transform: scale(1);
    }
  }

  @media (max-width: 760px) {
    .ag-shell {
      grid-template-columns: 1fr;
    }

    .ag-machine {
      min-height: 260px;
    }

    .ag-rules ul {
      columns: 1;
    }
  }

  @media (prefers-reduced-motion: reduce) {
    .ag-widget *,
    .ag-widget *::before,
    .ag-widget *::after {
      animation-duration: 0.01ms !important;
      animation-iteration-count: 1 !important;
      transition-duration: 0.01ms !important;
    }
  }
</style>

<script>
  (function () {
    const root = document.getElementById("affektions-gacha");
    const configEl = document.getElementById("ag-config");
    if (!root || !configEl) return;

    const config = JSON.parse(configEl.textContent);
    const totalWeight = config.categories.reduce((sum, category) => sum + category.weight, 0);

    const $ = (selector) => root.querySelector(selector);
    const drawButton = $("[data-ag-draw]");
    const buttonText = $("[data-ag-button-text]");
    const resultCard = $("[data-ag-result]");
    const rarityEl = $("[data-ag-rarity]");
    const dateEl = $("[data-ag-date]");
    const titleEl = $("[data-ag-title]");
    const messageEl = $("[data-ag-message]");
    const capsuleEl = $("[data-capsule]");
    const photoWrap = $("[data-ag-photo-wrap]");
    const photoEl = $("[data-ag-photo]");
    const photoCaption = $("[data-ag-photo-caption]");
    const copyButton = $("[data-ag-copy]");
    const sendLink = $("[data-ag-send]");
    const oddsList = $("[data-ag-odds]");
    const mainTitle = $("[data-ag-main-title]");
    const kicker = $("[data-ag-kicker]");

    let todaysPull = null;
    let albumPhotosLoaded = false;

    function dateKeyInTimezone(timezone) {
      const parts = new Intl.DateTimeFormat("de-CH", {
        timeZone: timezone,
        year: "numeric",
        month: "2-digit",
        day: "2-digit"
      }).formatToParts(new Date());

      const get = (type) => parts.find((part) => part.type === type).value;
      return `${get("year")}-${get("month")}-${get("day")}`;
    }

    function hashStringToUint32(input) {
      let hash = 2166136261;
      for (let index = 0; index < input.length; index += 1) {
        hash ^= input.charCodeAt(index);
        hash = Math.imul(hash, 16777619);
      }
      return hash >>> 0;
    }

    function mulberry32(seed) {
      return function () {
        let t = (seed += 0x6D2B79F5);
        t = Math.imul(t ^ (t >>> 15), t | 1);
        t ^= t + Math.imul(t ^ (t >>> 7), t | 61);
        return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
      };
    }

    function seededRandom(seedText) {
      return mulberry32(hashStringToUint32(seedText))();
    }

    function seededIndex(seedText, length) {
      if (!length) return 0;
      return Math.floor(seededRandom(seedText) * length);
    }

    function pickWeighted(seedText) {
      const roll = Math.floor(seededRandom(seedText) * totalWeight);
      let cursor = 0;
      for (const category of config.categories) {
        cursor += category.weight;
        if (roll < cursor) return category;
      }
      return config.categories[config.categories.length - 1];
    }

    function getToken() {
      const params = new URLSearchParams(window.location.search);
      return params.get(config.machine.tokenParam) || "default";
    }

    function displayNameFromToken() {
      const token = getToken();
      if (!token || token === "default") return config.machine.displayNameDefault || "Lennart";
      return token
        .replace(/[-_]+/g, " ")
        .trim()
        .split(/\s+/)
        .map((part) => part.charAt(0).toLocaleUpperCase("de-CH") + part.slice(1))
        .join(" ");
    }

    function buildPull() {
      const day = dateKeyInTimezone(config.machine.timezone);
      const token = getToken();
      const baseSeed = `${config.machine.secret}|${token}|${day}`;
      let category = pickWeighted(`${baseSeed}|category`);

      if (category.id === "photo" && !config.photos.length) {
        category = config.categories.find((item) => item.id === "common") || category;
      }

      const outcome = category.outcomes[
        seededIndex(`${baseSeed}|${category.id}|outcome`, category.outcomes.length)
      ];

      const photo =
        category.id === "photo" && config.photos.length
          ? config.photos[seededIndex(`${baseSeed}|photo`, config.photos.length)]
          : null;

      return {
        day,
        token,
        category,
        outcome,
        photo
      };
    }

    function setCapsuleTone(tone) {
      const colors = {
        quiet: "linear-gradient(90deg, #b9aa9f 0 50%, #efe4da 50% 100%)",
        soft: "linear-gradient(90deg, #a73d53 0 50%, #ffd5a3 50% 100%)",
        quest: "linear-gradient(90deg, #376a83 0 50%, #f6d9b7 50% 100%)",
        warm: "linear-gradient(90deg, #b9782e 0 50%, #f3c7a4 50% 100%)",
        cursed: "linear-gradient(90deg, #2b211b 0 50%, #d88fa0 50% 100%)",
        rare: "linear-gradient(90deg, #3f7460 0 50%, #ffd5a3 50% 100%)",
        photo: "linear-gradient(90deg, #3f7460 0 50%, #d9e8e0 50% 100%)",
        jackpot: "linear-gradient(90deg, #b9782e 0 50%, #fff0a8 50% 100%)"
      };
      capsuleEl.style.background = colors[tone] || colors.soft;
    }

    function messageText(pull) {
      return [
        `${displayNameFromToken()}s ${config.machine.name}: ${pull.category.label}`,
        `${pull.outcome.title}`,
        pull.outcome.message,
        pull.photo ? `Foto: ${pull.photo.caption || pull.photo.alt || "Foto-Drop"}` : "",
        `Tag: ${pull.day}`
      ]
        .filter(Boolean)
        .join("\n");
    }

    function renderPull(pull) {
      root.dataset.tone = pull.category.tone;
      setCapsuleTone(pull.category.tone);

      rarityEl.textContent = pull.category.label;
      dateEl.textContent = pull.day;
      titleEl.textContent = pull.outcome.title;
      messageEl.textContent = pull.outcome.message;

      if (pull.photo) {
        photoEl.src = pull.photo.url;
        photoEl.alt = pull.photo.alt || "Foto von uns";
        photoCaption.textContent = pull.photo.caption || "";
        photoWrap.hidden = false;
      } else {
        photoEl.removeAttribute("src");
        photoEl.alt = "";
        photoCaption.textContent = "";
        photoWrap.hidden = true;
      }

      const text = messageText(pull);
      const encodedSubject = encodeURIComponent("Mein Gacha-Zug");
      const encodedBody = encodeURIComponent(text);

      if (config.machine.messageTarget.startsWith("mailto:")) {
        sendLink.href = `${config.machine.messageTarget}?subject=${encodedSubject}&body=${encodedBody}`;
      } else {
        sendLink.href = config.machine.messageTarget.replace("{text}", encodedBody);
      }

      resultCard.hidden = false;
    }

    function reveal() {
      if (!todaysPull) todaysPull = buildPull();

      root.classList.add("is-revealing");
      drawButton.disabled = true;
      const steps = [
        "Route wird geprüft",
        "Snacklage wird berechnet",
        "Fotoarchiv wird durchsucht",
        "Kapsel fällt gleich"
      ];
      let stepIndex = 0;
      buttonText.textContent = steps[stepIndex];
      const stepTimer = window.setInterval(() => {
        stepIndex = Math.min(stepIndex + 1, steps.length - 1);
        buttonText.textContent = steps[stepIndex];
      }, Math.max(420, Math.floor((config.machine.revealDelayMs || 2800) / steps.length)));

      window.setTimeout(() => {
        window.clearInterval(stepTimer);
        renderPull(todaysPull);
        root.classList.remove("is-revealing");
        drawButton.disabled = false;
        buttonText.textContent = "Heute nochmal anzeigen";
      }, config.machine.revealDelayMs || 2800);
    }

    function renderOdds() {
      oddsList.innerHTML = "";
      for (const category of config.categories) {
        const li = document.createElement("li");
        li.textContent = `${category.label}: ${(category.weight / totalWeight * 100).toFixed(1)} %`;
        oddsList.appendChild(li);
      }
    }

    copyButton.addEventListener("click", async () => {
      if (!todaysPull) return;
      const text = messageText(todaysPull);
      try {
        await navigator.clipboard.writeText(text);
        copyButton.textContent = "Kopiert";
        window.setTimeout(() => {
          copyButton.textContent = "Resultat kopieren";
        }, 1400);
      } catch (error) {
        window.prompt("Resultat kopieren:", text);
      }
    });

    drawButton.addEventListener("click", reveal);

    async function loadPhotoManifest() {
      const url = config.machine.photoManifestUrl;
      if (!url) return;
      try {
        const response = await fetch(url, { cache: "no-store" });
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        const manifest = await response.json();
        if (Array.isArray(manifest.photos) && manifest.photos.length) {
          config.photos = manifest.photos.map((photo) => ({
            ...photo,
            url: new URL(photo.url, url).toString()
          }));
          albumPhotosLoaded = true;
          kicker.textContent = `Einmal pro Tag · ${config.photos.length} Erinnerungen geladen`;
        }
      } catch (error) {
        console.warn("Could not load photo manifest:", error);
      }
    }

    function personalize() {
      const displayName = displayNameFromToken();
      mainTitle.textContent = `${displayName}s Affektions-Gacha`;
      kicker.textContent = "Einmal pro Tag";
    }

    personalize();
    renderOdds();
    loadPhotoManifest();
  })();
</script>
