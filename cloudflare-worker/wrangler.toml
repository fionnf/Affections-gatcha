# Affektions-Gacha — Cloudflare Worker config
# Only edit the three lines marked ← CHANGE THIS

name               = "affektions-gacha-gate"
main               = "worker.js"
compatibility_date = "2024-09-23"

[vars]
# Where to send the user after a tap (your Webflow page URL)
REDIRECT_URL   = "https://YOUR-WEBFLOW-SITE.webflow.io/gacha"  # ← CHANGE THIS

# Your Webflow domain (for CORS). Use * to allow any origin.
ALLOWED_ORIGIN = "https://YOUR-WEBFLOW-SITE.webflow.io"        # ← CHANGE THIS

# A password that protects the /stats page (pick anything).
# Note: this is stored in wrangler.toml — don't commit this file to a public repo
# once you've filled it in. Alternatively, use `wrangler secret put ADMIN_TOKEN`
# and remove this line, exactly like JWT_SECRET below.
ADMIN_TOKEN    = "change-me-to-something-secret"               # ← CHANGE THIS

# ── Leave these as-is ─────────────────────────────────────────────────────────
SESSION_TTL_S = "900"   # session lasts 15 minutes after a tap
TOKEN_PARAM   = "token" # the URL param that names the NFC chip

# ── Optional: tap logging to Cloudflare KV ───────────────────────────────────
# If you want tap counts + history, run:
#   wrangler kv namespace create TAP_LOG
# Then uncomment and fill in the id that command prints:
#
# [[kv_namespaces]]
# binding = "TAP_LOG"
# id      = "paste-your-id-here"

# ── One secret: JWT_SECRET ────────────────────────────────────────────────────
# After deploying, run once:
#   wrangler secret put JWT_SECRET
# Paste any long random string (e.g. output of: openssl rand -hex 32)
