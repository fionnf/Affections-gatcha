<!doctype html>
<html lang="de">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Lennarts Affektions-Gacha</title>
    <meta
      name="description"
      content="Eine kleine tägliche Gacha-Maschine für Lennart."
    />
    <meta name="theme-color" content="#1a3a2c" />
    <link rel="manifest" href="./manifest.json" />
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        background: #eef5ea;
      }
    </style>
  </head>
  <body>
    <section id="affektions-gacha"></section>
    <div style="margin-top: 24px; text-align: center;">
      <a
        href="https://fionnf.github.io/linked_friend_lights/"
        target="_blank"
        rel="noopener noreferrer"
        style="
          display: inline-flex;
          align-items: center;
          gap: 8px;
          padding: 12px 24px;
          background: #1a3a2c;
          color: #eef5ea;
          text-decoration: none;
          border-radius: 999px;
          font-family: system-ui, sans-serif;
          font-size: 0.95rem;
          font-weight: 600;
          letter-spacing: 0.01em;
          box-shadow: 0 2px 8px rgba(0,0,0,0.15);
          transition: opacity 0.15s;
        "
        onmouseover="this.style.opacity='0.85'"
        onmouseout="this.style.opacity='1'"
      >
        💡 Lichtsteuerung
      </a>
    </div>
    <script
      src="./dist/affection-gacha.js"
      data-mount="#affektions-gacha"
      data-config-base="./"
      defer
    ></script>
  </body>
</html>
